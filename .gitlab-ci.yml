stages:
  - build
  - collect

build-windows:
  stage: build
  image: $CI_REGISTRY/veyon/ci-mingw-w64:main
  script:
    - ./prepare-build.sh
    - cd veyon && .ci/windows/build.sh $ARCH addons-binaries && cd ..
    - mv veyon/veyon-addons-* .
  parallel:
    matrix:
      - ARCH: [i686, x86_64]
  artifacts:
    paths: [ "veyon-addons*" ]

build-linux:
  stage: build
  image: veyon/ci.linux.$DISTRO:latest
  script:
    - ./prepare-build.sh
    - cd veyon && .ci/linux.$DISTRO/script.sh $CI_PROJECT_DIR/veyon $CI_PROJECT_DIR/build addons && cd ..
    - mv veyon/veyon-addons* .
  parallel:
    matrix:
      - DISTRO:
        - debian.11
        - debian.12
        - debian.13
        - fedora.42
        - fedora.43
        - opensuse.leap.16.0
        - opensuse.tumbleweed
        - rhel.8
        - rhel.9
        - ubuntu.22.04
        - ubuntu.24.04
  artifacts:
    paths: [ "veyon-addons*" ]

collect-artifacts:
  stage: collect
  dependencies: [ build-linux ]
  script:
    - ls -la *.deb *.rpm
  artifacts:
    paths: [ "veyon-addons*" ]
  image: veyon/ci.linux.debian.13:latest

variables:
  CMAKE_FLAGS: "-DWITH_CORE_ONLY=ON -DWITH_ADDONS=ON -DCPACK_PACKAGE_NAME=veyon-addons"
  GIT_SUBMODULE_STRATEGY: recursive
